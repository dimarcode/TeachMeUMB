<!-- Button to trigger the modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Book Appointment
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Book an Appointment with {{ tutor.username }}</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Form for booking appointment -->
      <form action="{{ url_for('main.book_appointment') }}" method="post" class="needs-validation" novalidate>
        <div class="modal-body">
          {{ form.hidden_tag() }} <!-- Include CSRF token -->
          <input type="hidden" name="tutor_id" value="{{ tutor.id }}">

          <!-- Subject Dropdown -->
          <div class="mb-3">
            <label for="subject-{{ tutor.id }}" class="form-label">Select Subject:</label>
            <select name="subject_id" id="subject-{{ tutor.id }}" class="form-select" required>
              <option value="" disabled selected>-- Select a subject --</option>
              {% for shared_subject in tutor.my_subjects %}
                {% if shared_subject in current_user.my_subjects %}
                  <option value="{{ shared_subject.id }}">{{ shared_subject.name }} - {{ shared_subject.topic }}</option>
                {% endif %}
              {% endfor %}
            </select>
            <div class="invalid-feedback">
              Please select a subject.
            </div>
          </div>

          <!-- Date Picker -->
          <div class="mb-3">
            <label for="booking_date" class="form-label">Date:</label>
            <input type="date" name="booking_date" id="booking_date" class="form-control" required min="{{ current_date }}">
            <div class="invalid-feedback">
              Please select a valid date.
            </div>
          </div>

          <!-- Time Picker -->
          <div class="mb-3">
            <label for="booking_time" class="form-label">Time:</label>
            <input type="time" name="booking_time" id="booking_time" class="form-control" required>
            <div class="invalid-feedback">
              Please select a valid time.
            </div>
          </div>
        </div> <!-- end of modal body -->

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-primary">Book Appointment</button>
        </div>
      </form>
    </div> <!-- end of modal content -->
  </div> <!-- end of modal-dialog -->
</div>
